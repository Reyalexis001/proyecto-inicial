<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administrativo — Sistema de Actas Mexicanas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; line-height: 1; display: inline-block; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      background: linear-gradient(135deg, #073d10 0%, #0d631b 55%, #1a7a2a 100%);
    }

    .inp {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px 12px 42px;
      font-size: 14px;
      background: #f9fafb;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .inp:focus { border-color: #0d631b; box-shadow: 0 0 0 3px rgba(13,99,27,0.12); }

    .btn-g {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #0d631b; color: #fff; font-weight: 600; font-size: 14px;
      padding: 14px 20px; border-radius: 12px; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-g:hover { background: #084f14; }
    .btn-g:active { transform: scale(0.98); }
    .btn-g:disabled { opacity: 0.6; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation: spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
  </style>
</head>
<body>

  <div style="width:100%;max-width:384px;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;background:rgba(255,255,255,0.2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);">
        <span class="material-symbols-outlined" style="color:#fff;font-size:30px;font-variation-settings:'FILL' 1;">admin_panel_settings</span>
      </div>
      <h1 style="font-size:24px;font-weight:800;color:#fff;margin:0;">Acceso Administrativo</h1>
      <p style="color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px;">Sistema de Actas Mexicanas</p>
    </div>

    <!-- Card -->
    <div style="background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.3);padding:32px;">

      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Email -->
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Correo Electrónico</label>
          <div style="position:relative;">
            <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:20px;pointer-events:none;">mail</span>
            <input id="email" type="email" placeholder="funcionario@gob.mx" class="inp">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Contraseña</label>
          <div style="position:relative;">
            <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:20px;pointer-events:none;">lock</span>
            <input id="password" type="password" placeholder="••••••••" class="inp" style="padding-right:44px;">
            <button onclick="togglePass()" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;">
              <span id="eye-icon" class="material-symbols-outlined" style="font-size:20px;">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="error-msg" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;align-items:center;gap:10px;">
          <span class="material-symbols-outlined" style="color:#f87171;font-size:18px;font-variation-settings:'FILL' 1;">error</span>
          <p id="error-text" style="font-size:12px;color:#dc2626;font-weight:500;margin:0;"></p>
        </div>

        <!-- Submit -->
        <button id="btn-login" onclick="doLogin()" class="btn-g" style="margin-top:4px;">
          <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1;">login</span>
          Iniciar Sesión
        </button>
      </div>

      <!-- Security note -->
      <div style="margin-top:24px;display:flex;align-items:center;justify-content:center;gap:6px;color:#9ca3af;">
        <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1;">security</span>
        <p style="font-size:12px;margin:0;">Acceso restringido a personal autorizado</p>
      </div>
    </div>

    <!-- Back link -->
    <div style="text-align:center;margin-top:24px;">
      <a href="/" style="color:rgba(255,255,255,0.5);font-size:12px;text-decoration:none;">← Volver al portal público</a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/panel.html';
    }

    function togglePass() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
      else { input.type = 'password'; icon.textContent = 'visibility'; }
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn       = document.getElementById('btn-login');
      const errorMsg  = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      if (!email || !password) {
        errorText.textContent = 'Ingresa tu correo y contraseña.';
        errorMsg.style.display = 'flex';
        return;
      }
      errorMsg.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>&nbsp;Verificando...';

      try {
        const res  = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorText.textContent = data.error || 'Credenciales incorrectas.';
          errorMsg.style.display = 'flex';
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:\'FILL\' 1;">login</span> Iniciar Sesión';
          return;
        }

        localStorage.setItem('admin_token', data.token);
        window.location.href = '/admin/panel.html';

      } catch {
        errorText.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:\'FILL\' 1;">login</span> Iniciar Sesión';
      }
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
