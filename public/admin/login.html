<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administrativo — Sistema de Actas Mexicanas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0d631b',
            'primary-dark': '#084f14',
            'primary-50': '#e8f5e9',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Outlined'; }
    .hero-bg { background: linear-gradient(135deg, #073d10 0%, #0d631b 55%, #1a7a2a 100%); }
    .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
    .input-field:focus { border-color: #0d631b; box-shadow: 0 0 0 3px rgba(13,99,27,0.12); outline: none; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation: spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
    .glass { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
  </style>
</head>
<body class="hero-bg min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <div class="w-full max-w-sm fade-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur border border-white/20">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1;">admin_panel_settings</span>
      </div>
      <h1 class="text-2xl font-extrabold text-white">Acceso Administrativo</h1>
      <p class="text-white/60 text-sm mt-1">Sistema de Actas Mexicanas</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-2xl shadow-2xl p-8">
      <div class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Correo Electrónico</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-400 text-[20px]">mail</span>
            </div>
            <input
              id="email"
              type="email"
              placeholder="funcionario@gob.mx"
              class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-900"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-400 text-[20px]">lock</span>
            </div>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="input-field w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-900"
            />
            <button
              onclick="togglePass()"
              class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
              type="button"
            >
              <span id="eye-icon" class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="error-msg" class="hidden bg-red-50 border border-red-100 rounded-xl px-4 py-3 flex items-center gap-2.5">
          <span class="material-symbols-outlined text-red-400 text-base" style="font-variation-settings:'FILL' 1;">error</span>
          <p id="error-text" class="text-xs text-red-600 font-medium"></p>
        </div>

        <!-- Submit button -->
        <button
          id="btn-login"
          onclick="doLogin()"
          class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl transition-all text-sm flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] mt-2"
        >
          <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">login</span>
          Iniciar Sesión
        </button>
      </div>

      <!-- Security note -->
      <div class="mt-6 flex items-center justify-center gap-1.5 text-gray-400">
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1;">security</span>
        <p class="text-xs">Acceso restringido a personal autorizado</p>
      </div>
    </div>

    <!-- Back link -->
    <div class="text-center mt-6">
      <a href="/" class="text-white/50 hover:text-white/80 text-xs transition-colors">← Volver al portal público</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/panel.html';
    }

    function togglePass() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');
      const errorMsg = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      if (!email || !password) {
        errorText.textContent = 'Ingresa tu correo y contraseña.';
        errorMsg.classList.remove('hidden');
        return;
      }
      errorMsg.classList.add('hidden');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>&nbsp; Verificando...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorText.textContent = data.error || 'Credenciales incorrectas.';
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined text-[18px]" style="font-variation-settings:\'FILL\' 1;">login</span> Iniciar Sesión';
          return;
        }

        localStorage.setItem('admin_token', data.token);
        window.location.href = '/admin/panel.html';

      } catch {
        errorText.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-[18px]" style="font-variation-settings:\'FILL\' 1;">login</span> Iniciar Sesión';
      }
    }

    // Enter key support
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
